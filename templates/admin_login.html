<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin Login | NGO Aadhar Foundation</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .login-header {
      background: #1b5e20;
      padding: 28px 32px;
      text-align: center;
    }
    .login-header img {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.3);
      margin-bottom: 12px;
    }
    .login-header h1 { color: #fff; font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .login-header p  { color: rgba(255,255,255,0.7); font-size: 12px; }
    .login-body { padding: 32px; }
    .alert-danger {
      background: #fdecea; color: #c62828;
      border-left: 4px solid #c62828;
      border-radius: 6px; padding: 11px 14px;
      font-size: 13px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group .input-wrap { position: relative; }
    .form-group .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
    .form-group input {
      width: 100%; padding: 11px 12px 11px 36px;
      border: 1px solid #ddd; border-radius: 7px;
      font-size: 14px; font-family: inherit;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    .form-group input:focus { outline: none; border-color: #2e7d32; background: #fff; }
    .btn-login {
      width: 100%; padding: 12px;
      background: #2e7d32; color: #fff;
      border: none; border-radius: 7px;
      font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: #1b5e20; }
    .login-footer { text-align: center; padding: 16px 32px; border-top: 1px solid #f0f0f0; }
    .login-footer a { font-size: 12px; color: #2e7d32; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="Logo">
      <h1>NGO Aadhar Foundation</h1>
      <p>Admin Panel &mdash; Restricted Access</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert-danger"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
    </div>
    <div class="login-footer">
      <a href="/"><i class="fas fa-arrow-left" style="margin-right:4px;"></i>Back to Website</a>
    </div>
  </div>
</div>
</body>
</html>
